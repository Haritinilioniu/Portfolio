<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haritini Ilioniu | Portfolio</title>
    <style>
        /* Base Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000000; color: #ffffff; padding: 40px 20px 0 20px; text-align: center; display: flex; flex-direction: column; min-height: 100vh; }

        /* Hamburger Menu Icon */
        .menu-icon { position: fixed; top: 30px; right: 30px; cursor: pointer; display: flex; flex-direction: column; gap: 6px; z-index: 1001; }
        .menu-icon div { width: 30px; height: 2px; background: #ffffff; transition: 0.3s; }

        /* Hidden Navigation Sidebar */
        nav { position: fixed; top: 0; right: -250px; width: 250px; height: 100vh; background: #111111; display: flex; flex-direction: column; padding: 100px 30px; gap: 20px; text-align: left; transition: 0.3s; z-index: 1000; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        nav.open { right: 0; }
        nav a { color: #ffffff; text-decoration: none; font-size: 1.2rem; font-weight: 300; }
        nav a:hover { color: #888888; }

        /* Header Elements */
        header { margin-top: 40px; margin-bottom: 60px; }
        .small-tag { font-size: 0.8rem; color: #888888; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }
        h1 { font-size: 3rem; font-weight: 400; margin-bottom: 40px; letter-spacing: 1px; }
        .section-title { font-size: 1.5rem; font-weight: 300; color: #ffffff; margin-bottom: 40px; }

        /* Content Sections */
        .section-divider { font-size: 1.2rem; font-weight: 300; color: #ffffff; margin: 60px 0 40px 0; letter-spacing: 1px; }

        /* Responsive Portfolio Grid Layout */
        .portfolio-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; width: 100%; }
        .portfolio-grid.photography-grid { grid-template-columns: 1fr 1.5fr; } /* Variations for photography section */
        @media (max-width: 768px) { .portfolio-grid, .portfolio-grid.photography-grid { grid-template-columns: 1fr; } }

        /* Image Display Cards */
        .artwork-card { position: relative; background: #111111; border: 1px solid #222222; border-radius: 4px; overflow: hidden; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; }
        .artwork-card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Text overlay on top of images */
        .overlay-text { position: absolute; bottom: 20px; left: 20px; color: #ffffff; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 2px; }

        /* --- Footer Section Matching Your Image --- */
        footer { margin-top: auto; width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto; padding: 80px 0 30px 0; border-top: 1px solid #111111; }
        .footer-main { display: flex; justify-content: space-between; align-items: flex-start; text-align: left; margin-bottom: 60px; }
        @media (max-width: 600px) { .footer-main { flex-direction: column; gap: 40px; text-align: center; align-items: center; } }
        
        .footer-links { display: flex; gap: 30px; }
        .footer-links a { color: #ffffff; text-decoration: none; font-size: 0.9rem; font-weight: 300; letter-spacing: 0.5px; }
        .footer-links a:hover { color: #888888; }
        
        .footer-brand { font-size: 1.1rem; font-weight: 300; letter-spacing: 1px; color: #ffffff; padding-right: 120px; } /* Pushes center name slightly right to visually balance links */
        @media (max-width: 600px) { .footer-brand { padding-right: 0; } }
        
        .footer-copyright { font-size: 0.7rem; color: #555555; letter-spacing: 0.5px; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- Interactive Navigation Control Script -->
    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

</body>
</html>
